<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google Drive — Echo Symphonic</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f7f4ef;
      color: #1c1b19;
      padding: 1.5rem;
      text-align: center;
    }
    .box {
      max-width: 28rem;
    }
    .warn {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      color: #6b5b3e;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="box">
    <p id="msg">Connexion Google en cours…</p>
    <p class="warn" id="hint" hidden></p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const ok = params.get("ok") !== "0";
      const error = params.get("error") || "";
      const msg = document.getElementById("msg");
      const hint = document.getElementById("hint");

      if (ok) {
        msg.textContent = "Google Drive connecté. Cette fenêtre va se fermer.";
      } else {
        msg.textContent = "Connexion Google échouée" + (error ? " : " + error : ".");
        hint.hidden = false;
        hint.innerHTML =
          "Rappel : l’app est en <strong>mode test</strong> Google. " +
          "Votre e-mail doit être ajouté comme utilisateur test dans la console Google Cloud, " +
          "et sur l’écran d’avertissement choisissez « Paramètres avancés » puis « Accéder à l’application ».";
      }

      const payload = { type: "cerfa-google-oauth", ok, error };
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin);
        }
      } catch (_) {}

      setTimeout(function () {
        window.close();
        if (ok) {
          msg.textContent = "Google Drive connecté. Vous pouvez fermer cette fenêtre.";
        }
      }, 500);
    })();
  </script>
</body>
</html>
